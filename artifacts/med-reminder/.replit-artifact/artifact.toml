kind = "mobile"
previewPath = "/"
title = "MediCare Reminder"
version = "1.0.0"
id = "artifacts/med-reminder"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23152

[services.development]
run = "pnpm --filter @workspace/med-reminder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/med-reminder", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/med-reminder", "run", "serve" ]

[services.env]
PORT = "23152"
BASE_PATH = "/"
